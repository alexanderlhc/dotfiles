# Melange (light) — savq/melange-nvim palette
# https://github.com/savq/melange-nvim
#
# 16-color ANSI mapped from the Melange light palette.
# Bright variants use the "b" palette (higher saturation = stronger
# contrast against the cream background); normal variants use "c".
#
# Foot picks [colors-dark] vs [colors-light] based on the system
# color-scheme preference. We define both with the same Melange Light
# palette so the theme applies regardless of system mode.

[colors-dark]
alpha=1.0
background=F1F1F1
foreground=54433A

selection-foreground=F1F1F1
selection-background=465AA4

regular0=54433A
regular1=C77B8B
regular2=6E9B72
regular3=BC5C00
regular4=7892BD
regular5=BE79BB
regular6=739797
regular7=A98A78

bright0=7D6658
bright1=BF0021
bright2=3A684A
bright3=A06D00
bright4=465AA4
bright5=904180
bright6=3D6568
bright7=D9D3CE

