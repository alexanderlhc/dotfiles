
###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Show keybind cheatsheet (auto-generated from this file via `hyprctl binds`)
bindd = $mainMod, F1, Show keybind cheatsheet, exec, ~/.config/hypr/scripts/cheatsheet.sh

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bindd = $mainMod, Q, Kill active window, killactive,
bindd = $mainMod, Return, Open terminal, exec, $terminal
bindd = $mainMod, C, Open clipboard menu, exec, $clipboardMenu
bindd = $mainMod, M, Logout / exit Hyprland, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bindd = $mainMod, E, Open file manager, exec, $fileManagerkitty
bindd = $mainMod, V, Toggle floating window, togglefloating,
bindd = $mainMod, R, Open app launcher, exec, $menu
bindd = $mainMod, P, Open password menu, exec, $rbwMenu
bindd = $mainMod, F, Toggle fullscreen, fullscreen

# Move focus with mainMod + arrow keys
bindd = $mainMod, left,  Focus window left,  movefocus, l
bindd = $mainMod, right, Focus window right, movefocus, r
bindd = $mainMod, up,    Focus window up,    movefocus, u
bindd = $mainMod, down,  Focus window down,  movefocus, d

# Move focus with mainMod + vim keys
bindd = $mainMod, h, Focus window left,  movefocus, l
bindd = $mainMod, j, Focus window down,  movefocus, d
bindd = $mainMod, k, Focus window up,    movefocus, u
bindd = $mainMod, l, Focus window right, movefocus, r

# Move active window with mainMod + SHIFT + vim keys
bindd = $mainMod SHIFT, h, Move window left,  movewindow, l
bindd = $mainMod SHIFT, j, Move window down,  movewindow, d
bindd = $mainMod SHIFT, k, Move window up,    movewindow, u
bindd = $mainMod SHIFT, l, Move window right, movewindow, r

# Switch workspaces with mainMod + [0-9]
bindd = $mainMod, 1, Switch to workspace 1,  workspace, 1
bindd = $mainMod, 2, Switch to workspace 2,  workspace, 2
bindd = $mainMod, 3, Switch to workspace 3,  workspace, 3
bindd = $mainMod, 4, Switch to workspace 4,  workspace, 4
bindd = $mainMod, 5, Switch to workspace 5,  workspace, 5
bindd = $mainMod, 6, Switch to workspace 6,  workspace, 6
bindd = $mainMod, 7, Switch to workspace 7,  workspace, 7
bindd = $mainMod, 8, Switch to workspace 8,  workspace, 8
bindd = $mainMod, 9, Switch to workspace 9,  workspace, 9
bindd = $mainMod, 0, Switch to workspace 10, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bindd = $mainMod SHIFT, 1, Move window to workspace 1,  movetoworkspace, 1
bindd = $mainMod SHIFT, 2, Move window to workspace 2,  movetoworkspace, 2
bindd = $mainMod SHIFT, 3, Move window to workspace 3,  movetoworkspace, 3
bindd = $mainMod SHIFT, 4, Move window to workspace 4,  movetoworkspace, 4
bindd = $mainMod SHIFT, 5, Move window to workspace 5,  movetoworkspace, 5
bindd = $mainMod SHIFT, 6, Move window to workspace 6,  movetoworkspace, 6
bindd = $mainMod SHIFT, 7, Move window to workspace 7,  movetoworkspace, 7
bindd = $mainMod SHIFT, 8, Move window to workspace 8,  movetoworkspace, 8
bindd = $mainMod SHIFT, 9, Move window to workspace 9,  movetoworkspace, 9
bindd = $mainMod SHIFT, 0, Move window to workspace 10, movetoworkspace, 10

# Special workspace (scratchpad)
bindd = $mainMod,       S, Toggle scratchpad,           togglespecialworkspace, magic
bindd = $mainMod SHIFT, S, Move window to scratchpad,   movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bindd = $mainMod, mouse_down, Switch to next workspace,     workspace, e+1
bindd = $mainMod, mouse_up,   Switch to previous workspace, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Screenshots (PrintScreen submap)
bindd = , Print, Enter screenshot mode (A=all P=region), submap, screenshot
submap = screenshot
bindd = , A,      Screenshot full screen, exec, grim ~/Pictures/Screenshots/$(date +%F-%T).png
bindd = , P,      Screenshot a region,    exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%F-%T).png
bindd = , Escape, Exit screenshot mode,   submap, reset
bindd = , Return, Exit screenshot mode,   submap, reset
submap = reset
