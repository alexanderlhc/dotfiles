# Melange (light) — savq/melange-nvim palette
# https://github.com/savq/melange-nvim
#
# Uses Hyprland's keyword syntax so these overrides win regardless of
# the structure of look-and-feel.conf, as long as this file is sourced
# AFTER it in hyprland.conf.

# Borders: active gradient blue→green (b.blue → b.green); inactive a.ui
general:col.active_border   = rgba(465AA4ee) rgba(3A684Aee) 45deg
general:col.inactive_border = rgba(A98A78aa)

# Shadow: softened a.fg
decoration:shadow:color = rgba(54433A55)
