# Melange (light) — savq/melange-nvim palette
# https://github.com/savq/melange-nvim

# Palette
#   a.bg     #F1F1F1   a.float  #E9E1DB   a.sel    #D9D3CE
#   a.ui     #A98A78   a.com    #7D6658   a.fg     #54433A
#   b.red    #BF0021   b.green  #3A684A   b.yellow #A06D00
#   b.blue   #465AA4   b.cyan   #3D6568   b.magenta #904180

# Status bar
set -g status-style                 "bg=#E9E1DB,fg=#54433A"
set -g status-left-style            "bg=#E9E1DB,fg=#54433A"
set -g status-right-style           "bg=#E9E1DB,fg=#54433A"
set -g status-left-length           60
set -g status-right-length          60

set -g status-left  ' #[bold,fg=#BF0021]<3 #[nobold,fg=#3A684A]#S #[fg=#A98A78]| '
set -g status-right '#[fg=#A98A78]| #[fg=#54433A,bold]%H:%M #[nobold,fg=#7D6658]· %d %b %Y '

# Windows (preserve superscript index + zoom indicator)
set -g window-status-separator " "
set -g window-status-format         "#[fg=#7D6658,bg=#E9E1DB] #{s/0/⁰/;s/1/¹/;s/2/²/;s/3/³/;s/4/⁴/;s/5/⁵/;s/6/⁶/;s/7/⁷/;s/8/⁸/;s/9/⁹/:window_index} #W#{?window_zoomed_flag, 🔍,⁕} "
set -g window-status-current-format "#[fg=#F1F1F1,bg=#465AA4,bold] #{s/0/⁰/;s/1/¹/;s/2/²/;s/3/³/;s/4/⁴/;s/5/⁵/;s/6/⁶/;s/7/⁷/;s/8/⁸/;s/9/⁹/:window_index} #W#{?window_zoomed_flag, 🔍,⁕} "
set -g window-status-activity-style "fg=#A06D00,bg=#E9E1DB"
set -g window-status-bell-style     "fg=#BF0021,bg=#E9E1DB,bold"

# Panes
set -g pane-border-style        "fg=#A98A78"
set -g pane-active-border-style "fg=#465AA4"

# Dim inactive panes so the active one is unambiguous in splits
set -g window-style        "bg=#E9E1DB,fg=#54433A"
set -g window-active-style "bg=#F1F1F1,fg=#54433A"

# Messages / prompt
set -g message-style         "bg=#D9D3CE,fg=#54433A"
set -g message-command-style "bg=#D9D3CE,fg=#54433A"

# Copy mode / mouse selection (use colour indices — hex needs RGB terminal capability)
set -g mode-style "bg=colour67,fg=colour255,bold"

# Clock
set -g clock-mode-colour "#465AA4"
