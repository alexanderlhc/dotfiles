
#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox

# Bring up xdg-desktop-portal (needed by flameshot/screenshare).
# graphical-session.target never activates when Hyprland is launched directly,
# so import the env and start the portal ignoring that dead dependency.
exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP HYPRLAND_INSTANCE_SIGNATURE && systemctl --user start --job-mode=ignore-dependencies xdg-desktop-portal.service

exec-once = systemctl --user start hyprpolkitagent
exec-once = mako
exec-once = waybar
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
