# Strip hardcoded bg from inactive tabs so they inherit
# the per-session status-bar tint set by session-colors.sh.

set -g window-status-format         "#[fg=#7d6658] #{s/0/⁰/;s/1/¹/;s/2/²/;s/3/³/;s/4/⁴/;s/5/⁵/;s/6/⁶/;s/7/⁷/;s/8/⁸/;s/9/⁹/:window_index} #W#{?window_zoomed_flag, 🔍,⁕} "
set -g window-status-activity-style "fg=#bf0021"
set -g window-status-bell-style     "fg=#bf0021,bold"
